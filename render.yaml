services:
  - type: web_service
    name: flately-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: flately-redis
          property: connectionString

  - type: redis
    name: flately-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
